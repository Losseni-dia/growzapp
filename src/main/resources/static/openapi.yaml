openapi: 3.0.3
info:
  title: Growzapp - API Module Projet
  version: 1.0.0
  description: |
    Gestion du cycle de vie des projets : Création (multipart), Consultation (ID/Slug) et Recherche géographique.
    Base URL: `/api/projets`

tags:
  - name: Projet Controller
    description: Endpoints pour les investisseurs et les porteurs de projets.

paths:
  /api/projets:
    get:
      tags:
        - Projet Controller
      summary: Liste tous les projets validés (Public)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListProjetDTO'

    post:
      tags:
        - Projet Controller
      summary: Création d'un projet avec upload de poster
      description: Nécessite une authentification. Utilise le format multipart/form-data.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                projet:
                  $ref: '#/components/schemas/ProjetCreateDTO'
                  description: "Objet JSON contenant les détails du projet"
                poster:
                  type: string
                  format: binary
                  description: "Fichier image (max 10Mo)"
      responses:
        '201':
          description: Projet créé avec succès
        '401':
          description: Non authentifié
        '400':
          description: Erreur de validation ou fichier trop lourd

  /api/projets/{id}:
    get:
      tags:
        - Projet Controller
      summary: Détails d'un projet par son ID technique
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseProjetDTO'

  /api/projets/slug/{slug}:
    get:
      tags:
        - Projet Controller
      summary: Détails d'un projet par son Slug (SEO)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/projets/proche-de-moi:
    get:
      tags:
        - Projet Controller
      summary: Recherche géographique
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: rayon
          in: query
          schema:
            type: number
            format: double
            default: 100
      responses:
        '200':
          description: Liste des projets à proximité

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- DTOs de réponse enveloppés ---
    ApiResponseProjetDTO:
      type: object
      properties:
        status: { type: string, example: "success" }
        message: { type: string }
        data: { $ref: '#/components/schemas/ProjetDTO' }

    ApiResponseListProjetDTO:
      type: object
      properties:
        status: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/ProjetDTO' }

    # --- Les Records (DTOs) ---
    ProjetCreateDTO:
      type: object
      required: [libelle, description, objectifFinancement, prixUnePart]
      properties:
        libelle: { type: string }
        description: { type: string }
        secteurNom: { type: string }
        localiteNom: { type: string }
        objectifFinancement: { type: number, format: double }
        prixUnePart: { type: number, format: double }
        partsDisponible: { type: integer }
        roiProjete: { type: number, format: double }
        valuation: { type: number, format: double }
        dureeMois: { type: integer, default: 36 }
        dateDebut: { type: string, format: date }
        dateFin: { type: string, format: date }

    ProjetDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        poster: { type: string, description: "URL de l'image" }
        reference: { type: integer }
        libelle: { type: string }
        description: { type: string }
        valuation: { type: number }
        roiProjete: { type: number }
        partsDisponible: { type: integer }
        partsPrises: { type: integer }
        prixUnePart: { type: number }
        objectifFinancement: { type: number }
        montantCollecte: { type: number }
        statutProjet: { type: string, enum: [SOUMIS, EN_COURS, TERMINE, ANNULE] }
        googleMapsUrl: { type: string }
        # IDs de relations
        porteurId: { type: integer, format: int64 }
        secteurId: { type: integer, format: int64 }
        # Audit
        createdAt: { type: string, format: date-time }
        certifiedAt: { type: string, format: date-time }